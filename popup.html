<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Known</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="known-popup">
    <main class="known-popup__card">
      <header class="known-popup__header">
        <img src="icons/icon-48.png" alt="Known logo" class="known-popup__logo" />
        <div>
          <p class="known-popup__eyebrow">Known</p>
          <h1 class="known-popup__title">AI Memory</h1>
        </div>
      </header>

      <!-- SETUP VIEW: shown when no key configured -->
      <section id="setupView" style="display:none;">
        <p class="known-popup__status" style="margin-bottom:12px;">✦ Connect your Known account</p>
        
        <div style="margin-bottom:16px;">
          <label style="font-size:11px;color:#888;letter-spacing:0.05em;text-transform:uppercase;display:block;margin-bottom:6px;">API Key</label>
          <input id="apiKeyInput" type="text" placeholder="kn_live_..." 
            style="width:100%;padding:8px 10px;background:#1a1a1a;border:1px solid #2f2f2f;border-radius:6px;color:#e8e8e8;font-size:13px;font-family:monospace;outline:none;" />
        </div>

        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <button id="connectBtn" type="button" 
            style="flex:1;padding:8px;background:#b89a6a;color:#070706;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:0.05em;">
            Connect
          </button>
          <button id="createNewBtn" type="button" 
            style="flex:1;padding:8px;background:transparent;color:#888;border:1px solid #2f2f2f;border-radius:6px;font-size:12px;cursor:pointer;">
            Create new account
          </button>
        </div>

        <p id="setupError" style="font-size:11px;color:#c55;display:none;margin-bottom:8px;"></p>

        <p style="font-size:11px;color:#555;line-height:1.5;">
          Don't have a key? Ask your AI agent:<br>
          <em style="color:#888;">"What's my Known API key?"</em><br>
          Or run: <code style="color:#888;font-size:10px;">cat ~/.known/credentials.json</code>
        </p>
      </section>

      <!-- CONNECTED VIEW: shown when key is configured -->
      <section id="connectedView" style="display:none;">
        <section class="known-popup__stats">
          <article class="known-popup__stat">
            <span class="known-popup__label">Nodes</span>
            <strong id="nodesValue" class="known-popup__value">-</strong>
          </article>
          <article class="known-popup__stat">
            <span class="known-popup__label">Insights</span>
            <strong id="insightsValue" class="known-popup__value">-</strong>
          </article>
          <article class="known-popup__stat known-popup__stat--wide">
            <span class="known-popup__label">Plan</span>
            <strong id="planValue" class="known-popup__value">-</strong>
          </article>
        </section>

        <p id="statusText" class="known-popup__status">Memory is active.</p>

        <button id="disconnectBtn" type="button" 
          style="width:100%;padding:6px;background:transparent;color:#666;border:1px solid #2f2f2f;border-radius:6px;font-size:11px;cursor:pointer;margin-top:8px;">
          Disconnect account
        </button>
      </section>

      <footer class="known-popup__footer">
        <a class="known-popup__link" href="https://finallyknown.ai" target="_blank" rel="noreferrer">
          finallyknown.ai
        </a>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
